name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: sudo chmod -R a+rwX "$GITHUB_WORKSPACE"

      - uses: coq-community/docker-coq-action@v1
        with:
          coq_version: '9.0'
          ocaml_version: '4.14-flambda'
          custom_script: |
            startGroup "Build"
            make
            endGroup
            startGroup "Check extraction produces no warnings"
            if grep -q 'Warning' rack.ml 2>/dev/null; then
              echo "Extraction warnings found in rack.ml"
              grep 'Warning' rack.ml
              exit 1
            fi
            echo "No extraction warnings found"
            endGroup
            startGroup "Check extracted OCaml compiles"
            ocamlfind ocamlopt -package str -c rack.mli rack.ml || \
              ocamlfind ocamlc -package str -c rack.mli rack.ml || \
              ocamlopt -c rack.mli rack.ml || \
              ocamlc -c rack.mli rack.ml
            endGroup
            startGroup "Run extracted OCaml tests"
            ( ocamlfind ocamlopt -package str -linkpkg rack.ml test_rack.ml -o test_rack && ./test_rack ) || \
              ( ocamlfind ocamlc -package str -linkpkg rack.ml test_rack.ml -o test_rack && ./test_rack ) || \
              ( ocamlopt -I +str str.cmxa rack.ml test_rack.ml -o test_rack && ./test_rack ) || \
              ( ocamlc -I +str str.cma rack.ml test_rack.ml -o test_rack && ./test_rack ) || \
              echo "OCaml test compilation failed (non-fatal)"
            endGroup
            startGroup "Generate coqdoc"
            mkdir -p docs
            coqdoc --html --interpolate --utf8 \
              -R theories RACK \
              -d docs \
              theories/Core.v theories/Main.v theories/Reflect.v \
              theories/Export.v theories/Notation.v \
              theories/EvidenceClass.v theories/ProofIdentity.v \
              theories/Entailment.v theories/Trace.v \
              theories/Delta.v theories/Incremental.v \
              theories/ProductLine.v theories/Bridge.v \
              theories/CaseStudy.v theories/Example.v \
              || echo "coqdoc generation failed (non-fatal)"
            endGroup
      - name: Upload coqdoc
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: coqdoc
          path: docs/
